<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>steam library</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 2rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ffffff;
            border-bottom: 2px solid #333;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .table-wrapper {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background-color: #2c2c2c;
            font-weight: 600;
            color: #ffffff;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        th:hover {
            background-color: #3d3d3d;
        }
        tr:hover {
            background-color: #2a2a2a;
        }
        .hours {
            font-family: monospace;
            color: #64b5f6;
        }
        .status-verified {
            color: #81c784;
        }
        .status-playable {
            color: #ffd54f;
        }
        .status-unsupported {
            color: #e57373;
        }
        .status-unknown {
            color: #9e9e9e;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>steam library</h1>
        <div class="table-wrapper">
            <table id="library-table">
                <thead>
                    <tr>
                        <th onclick="sortTable('game')">game ↕</th>
                        <th onclick="sortTable('hours')">hours ↕</th>
                        <th onclick="sortTable('last_played')">last played ↕</th>
                        <th onclick="sortTable('steam_deck')">deck status ↕</th>
                        <th onclick="sortTable('release_date')">release date ↕</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr><td colspan="5">loading library data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let libraryData = [];
        let currentSort = { column: 'hours', asc: false };

        Papa.parse('steam-library-vanillyn(2).csv', {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                libraryData = results.data;
                sortData('hours'); 
                renderTable();
            },
            error: function() {
                document.getElementById('table-body').innerHTML = 
                    '<tr><td colspan="5">failed to load the csv file. make sure it is in the same directory.</td></tr>';
            }
        });

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = '';

            libraryData.forEach(row => {
                if (!row.game) return;

                const tr = document.createElement('tr');
                
                const hoursVal = parseFloat(row.hours);
                const formattedHours = !isNaN(hoursVal) ? hoursVal.toFixed(1) : '0.0';

                const deckStatus = (row.steam_deck || 'unknown').toLowerCase();
                const statusClass = `status-${deckStatus}`;

                tr.innerHTML = `
                    <td>${escapeHtml(row.game)}</td>
                    <td class="hours">${formattedHours}</td>
                    <td>${escapeHtml(row.last_played || 'never')}</td>
                    <td class="${statusClass}">${escapeHtml(row.steam_deck || 'unknown')}</td>
                    <td>${escapeHtml(row.release_date || 'unknown')}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function sortTable(column) {
            if (currentSort.column === column) {
                currentSort.asc = !currentSort.asc;
            } else {
                currentSort.column = column;
                currentSort.asc = true;
            }
            sortData(column);
            renderTable();
        }

        function sortData(column) {
            libraryData.sort((a, b) => {
                let valA = a[column] || '';
                let valB = b[column] || '';

                if (column === 'hours') {
                    valA = parseFloat(valA) || 0;
                    valB = parseFloat(valB) || 0;
                } else {
                    valA = valA.toString().toLowerCase();
                    valB = valB.toString().toLowerCase();
                }

                if (valA < valB) return currentSort.asc ? -1 : 1;
                if (valA > valB) return currentSort.asc ? 1 : -1;
                return 0;
            });
        }

        function escapeHtml(unsafe) {
            return (unsafe || '').toString()
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }
    </script>
</body>
</html>
